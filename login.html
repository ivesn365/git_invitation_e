<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>IHSS-RDC | EVENT</title>
  <!-- base:css -->
  <link rel="stylesheet" href="vendors/mdi/css/materialdesignicons.min.css">
  <link rel="stylesheet" href="endors/css/vendor.bundle.base.css">
  <!-- endinject -->
  <!-- plugin css for this page -->
  <!-- End plugin css for this page -->
  <!-- inject:css -->
  <link rel="stylesheet" href="css/style.css">
  <!-- endinject -->
  <link rel="shortcut icon" href="images/logo.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
  <div class="container-scroller d-flex">
    <div class="container-fluid page-body-wrapper full-page-wrapper d-flex">
      <div class="content-wrapper d-flex align-items-center auth px-0">
        <div class="row w-100 mx-0">
          <div class="col-lg-4 mx-auto">
            <div class="auth-form-light text-left py-5 px-4 px-sm-5">
              <div class="brand-logo">
                <img src="images/logo.png" alt="logo">
              </div>
              <h4>Bonjour! Commençons</h4>
              <h6 class="font-weight-light">Connectez-vous pour continuer.</h6>

              <div id="msg"></div>
              <form class="pt-3">
                <div class="form-group">
                  <input type="text" class="form-control form-control-lg" id="pseudo" placeholder="Nom d'utilisateur">
                </div>
                <div class="form-group">
                  <input type="password" class="form-control form-control-lg" id="password" placeholder="Mot de passe">
                </div>
                <div class="mt-3">
                  <button class="btn btn-block btn-primary btn-lg font-weight-medium auth-form-btn" id="btn_send_data" onclick="sendData()" type="button">Se connecter</button>
                  <button class="btn btn-success btn-block border-0" hidden id="load">
                    <i class="fa fa-refresh fa-spin"></i>Veuillez patienter svp
                  </button>
                </div>


                <div class="text-center mt-4 font-weight-light">
                  Produced by ? <a href="https://ihs-rdc.com/" class="text-primary">IHS-RDC</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
      <!-- content-wrapper ends -->
    </div>
    <!-- page-body-wrapper ends -->
  </div>
  <!-- container-scroller -->
  <!-- base:js -->
  <script src="vendors/js/vendor.bundle.base.js"></script>
  <!-- endinject -->
  <!-- inject:js -->
  <script src="js/off-canvas.js"></script>
  <script src="js/hoverable-collapse.js"></script>
  <script src="js/template.js"></script>
  <!-- endinject -->

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script>
    let f = null
    function sendData(){
      let pseudo_u = document.getElementById("pseudo").value
      let password_u = document.getElementById("password").value
      if ((password_u) && (pseudo_u)){
        document.getElementById("btn_send_data").hidden = true
        document.getElementById("load").hidden = false
        $.ajax({
          url: "data.html",
          method: "POST",
          data: {
            pseudo_connexion: pseudo_u,
            password_connexion:password_u
          },
          success: function (data) {
            f = data

          }


        })

        setTimeout(RedirectionJavascript, 5000)
      }
      else{
        document.getElementById("msg").innerHTML = '<div class="alert alert-danger text-center"><strong>Veuillez remplir les champs vides svp !</strong></div>'
      }


    }

    function RedirectionJavascript(){
      if(f=="1"){
        window.location.href = "page-accueil"
      }
      else if(f=="2"){
        window.location.href = "formModifier.html"
      }
      else if(f=="4"){
        window.location.href = "ihs-event-message"
      }
      else {
       
        document.getElementById("msg").innerHTML = '<div class="alert alert-danger text-center"><strong>Votre nom d\'utilisateur ou mot de passe incorrect</strong></div>'
        document.getElementById("btn_send_data").hidden = false
        document.getElementById("load").hidden = true
      }
    }

  </script>
</body>

</html>
